<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#x667A;&#x5E93;&#x4E13;&#x680F;&#x53D1;&#x5E03;&#x540E;&#x53F0;</title>
  <style>
    :root{--bg:#0a0d12;--panel:#121821;--panel-soft:#18212c;--border:#263242;--text:#edf2f7;--muted:#9fb0c4;--accent:#f0b90b;--danger:#ff6b6b;--ok:#2fbf71}
    *{box-sizing:border-box}
    body{margin:0;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#0a0d12,#0e141d);color:var(--text);padding:24px}
    .wrap{max-width:1240px;margin:0 auto}
    .panel{background:rgba(18,24,33,.96);border:1px solid var(--border);border-radius:18px;padding:22px;box-shadow:0 24px 60px rgba(0,0,0,.35);margin-bottom:20px}
    h1,h2{margin:0 0 12px}
    p{color:var(--muted);margin:0}
    .topbar,.actions,.links{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
    .actions{justify-content:flex-start;margin-top:16px}
    .status{min-height:24px;margin-top:14px;color:var(--muted)}
    .status.error{color:var(--danger)}
    .status.ok{color:var(--ok)}
    input,select,textarea{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--panel-soft);color:var(--text);font:inherit}
    textarea{min-height:140px;resize:vertical}
    button,.link-btn{border:none;border-radius:10px;padding:12px 16px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    .primary{background:var(--accent);color:#111}
    .secondary,.link-btn{background:#223043;color:var(--text)}
    .danger{background:rgba(255,107,107,.12);color:#ffb3b3;border:1px solid rgba(255,107,107,.25)}
    .cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:18px}
    .card{padding:16px;border-radius:14px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02)}
    .card-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
    .card-title{font-size:1.08rem;font-weight:800;color:#f3df9b}
    .card-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px 12px}
    .field .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
    .checkline{display:flex;align-items:center;gap:8px}
    .checkline input{width:18px;height:18px;accent-color:var(--accent)}
    .hint{color:var(--muted);font-size:13px;margin-top:10px}
    @media (max-width:900px){.cards,.card-grid{grid-template-columns:1fr}}
    @media (max-width:700px){body{padding:16px}.topbar,.actions,.links{flex-direction:column;align-items:stretch}button,.link-btn{width:100%}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="topbar">
        <div>
          <h1>&#x667A;&#x5E93;&#x4E13;&#x680F;&#x53D1;&#x5E03;&#x540E;&#x53F0;</h1>
          <p>&#x53D1;&#x5E03;&#x4F1A;&#x5458;&#x6743;&#x76CA;&#x9875;&#x7684;&#x6DF1;&#x5EA6;&#x6587;&#x7AE0;&#xFF0C;&#x652F;&#x6301;&#x7F6E;&#x9876;&#x3001;&#x63A8;&#x8350;&#x3001;&#x663E;&#x793A;&#x63A7;&#x5236;&#x3002;</p>
        </div>
        <div style="min-width:280px;width:320px;max-width:100%;">
          <input id="passwordInput" type="password" placeholder="&#x8BF7;&#x8F93;&#x5165;&#x7BA1;&#x7406;&#x5BC6;&#x7801;">
        </div>
      </div>
      <div class="links" style="margin-top:12px;">
        <a class="link-btn" href="/admin-alpha.html">&#x8FD4;&#x56DE;&#x4E3B;&#x540E;&#x53F0;</a>
        <a class="link-btn" href="/member-thinktank.html" target="_blank" rel="noopener noreferrer">&#x6253;&#x5F00;&#x667A;&#x5E93;&#x4F1A;&#x5458;&#x9875;</a>
      </div>
      <div id="globalStatus" class="status"></div>
    </div>

    <div class="panel">
      <h2>&#x667A;&#x5E93;&#x6587;&#x7AE0;&#x7BA1;&#x7406;</h2>
      <p>&#x5185;&#x5BB9;&#x652F;&#x6301; Markdown &#x8F93;&#x5165;&#xFF08;&#x6807;&#x9898;&#x3001;&#x7C97;&#x4F53;&#x3001;&#x94FE;&#x63A5;&#x3001;&#x5206;&#x884C;&#x7B49;&#xFF09;&#x3002;</p>
      <div class="actions">
        <button class="secondary" id="loadBtn">&#x8BFB;&#x53D6;&#x5F53;&#x524D;&#x6587;&#x7AE0;</button>
        <button class="secondary" id="addBtn">&#x65B0;&#x5EFA;&#x6587;&#x7AE0;</button>
        <button class="primary" id="saveBtn">&#x4FDD;&#x5B58;&#x5168;&#x90E8;&#x6587;&#x7AE0;</button>
      </div>
      <div class="hint">&#x5EFA;&#x8BAE;&#xFF1A;&#x6BCF;&#x7BC7;&#x6587;&#x7AE0;&#x5199;&#x597D;&#x6458;&#x8981;&#x4E0E;&#x6807;&#x7B7E;&#xFF0C;&#x4FBF;&#x4E8E;&#x4F1A;&#x5458;&#x5FEB;&#x901F;&#x7B5B;&#x9009;&#x3002;</div>
      <div id="cards" class="cards"></div>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    const passwordInput=document.getElementById('passwordInput');
    const globalStatus=document.getElementById('globalStatus');
    const cards=document.getElementById('cards');
    const statusEl=document.getElementById('status');

    passwordInput.value=localStorage.getItem('alphaAdminPassword')||'';
    document.getElementById('loadBtn').addEventListener('click',loadPosts);
    document.getElementById('addBtn').addEventListener('click',()=>addCard());
    document.getElementById('saveBtn').addEventListener('click',savePosts);

    function getPassword(){const password=passwordInput.value.trim();localStorage.setItem('alphaAdminPassword',password);return password}
    function setStatus(el,message,type){el.className='status'+(type?' '+type:'');el.textContent=message}
    function requirePassword(){const pwd=getPassword();if(!pwd){setStatus(globalStatus,'\u8BF7\u5148\u8F93\u5165\u7BA1\u7406\u5BC6\u7801\u3002','error');return ''}setStatus(globalStatus,'','');return pwd}
    function createInput(field,placeholder,value,type){const input=document.createElement('input');input.setAttribute('data-field',field);input.placeholder=placeholder;input.value=value==null?'':String(value);if(type)input.type=type;return input}
    function createTextarea(field,placeholder,value){const t=document.createElement('textarea');t.setAttribute('data-field',field);t.placeholder=placeholder;t.value=value||'';return t}
    function createField(label,node){const wrap=document.createElement('div');wrap.className='field';const title=document.createElement('div');title.className='label';title.textContent=label;wrap.appendChild(title);wrap.appendChild(node);return wrap}
    function createCheck(field,text,checked){const wrap=document.createElement('label');wrap.className='checkline';const input=document.createElement('input');input.type='checkbox';input.setAttribute('data-field',field);input.checked=Boolean(checked);const span=document.createElement('span');span.textContent=text;wrap.appendChild(input);wrap.appendChild(span);return wrap}

    function addCard(item){
      const data=item||{};
      const card=document.createElement('div');
      card.className='card';
      card.dataset.postId=data.id||'';
      const top=document.createElement('div');
      top.className='card-top';
      const title=document.createElement('div');
      title.className='card-title';
      title.textContent=data.title||'\u65B0\u6587\u7AE0';
      const delBtn=document.createElement('button');
      delBtn.type='button';
      delBtn.className='danger';
      delBtn.textContent='\u5220\u9664';
      delBtn.addEventListener('click',()=>card.remove());
      top.appendChild(title);top.appendChild(delBtn);

      const grid=document.createElement('div');
      grid.className='card-grid';

      const titleInput=createInput('title','\u6587\u7AE0\u6807\u9898',data.title||'');
      titleInput.addEventListener('input',()=>{title.textContent=titleInput.value.trim()||'\u65B0\u6587\u7AE0';});
      grid.appendChild(createField('\u6807\u9898',titleInput));
      grid.appendChild(createField('\u5206\u7C7B',createInput('category','\u4F8B\u5982\uff1A\u5B8F\u89C2 / \u8D5B\u9053 / \u65B9\u6CD5',data.category||'')));
      grid.appendChild(createField('\u4F5C\u8005',createInput('author','\u4F8B\u5982\uff1ADr.D',data.author||'DYOR Research')));
      grid.appendChild(createField('\u53D1\u5E03\u65E5',createInput('publishedAt','YYYY-MM-DD',data.publishedAt||'', 'date')));
      grid.appendChild(createField('\u9605\u8BFB\u65F6\u957F(\u5206\u949F)',createInput('readMinutes','\u4F8B\u5982 8',data.readMinutes==null?8:data.readMinutes,'number')));
      grid.appendChild(createField('\u6807\u7B7E',createInput('tags','\u9017\u53F7\u5206\u9694\uff0c\u4F8B\u5982\uff1AAI, BTC, \u98CE\u9669\u63A7\u5236',Array.isArray(data.tags)?data.tags.join(', '):(data.tags||''))));
      const summaryField=createField('\u6458\u8981',createTextarea('summary','\u4E00\u53E5\u8BDD\u6458\u8981',data.summary||''));summaryField.style.gridColumn='1 / -1';grid.appendChild(summaryField);
      const contentField=createField('\u6B63\u6587 (Markdown)',createTextarea('content','\u586B\u5199\u6DF1\u5EA6\u5185\u5BB9',data.content||''));contentField.style.gridColumn='1 / -1';grid.appendChild(contentField);
      grid.appendChild(createField('\u7F6E\u9876',createCheck('featured','\u8BBE\u4E3A\u7F6E\u9876',data.featured)));
      grid.appendChild(createField('\u4F1A\u5458\u53EF\u89C1',createCheck('visibleToWhitelist','\u5BF9\u4F1A\u5458\u663E\u793A',data.visibleToWhitelist!==false)));

      card.appendChild(top);card.appendChild(grid);cards.appendChild(card);
    }

    function collectCards(){
      return Array.from(cards.querySelectorAll('.card')).map((card,index)=>({
        id:card.dataset.postId||('post_'+Date.now()+'_'+index),
        title:card.querySelector('[data-field="title"]').value.trim(),
        category:card.querySelector('[data-field="category"]').value.trim(),
        author:card.querySelector('[data-field="author"]').value.trim(),
        publishedAt:card.querySelector('[data-field="publishedAt"]').value.trim(),
        readMinutes:Number(card.querySelector('[data-field="readMinutes"]').value),
        tags:card.querySelector('[data-field="tags"]').value.trim(),
        summary:card.querySelector('[data-field="summary"]').value.trim(),
        content:card.querySelector('[data-field="content"]').value.trim(),
        featured:card.querySelector('[data-field="featured"]').checked,
        visibleToWhitelist:card.querySelector('[data-field="visibleToWhitelist"]').checked
      })).filter(item=>item.title||item.summary||item.content);
    }

    async function loadPosts(){
      const adminPassword=requirePassword();if(!adminPassword)return;
      setStatus(statusEl,'\u6B63\u5728\u8BFB\u53D6\u667A\u5E93\u6587\u7AE0...','');
      try{
        const response=await fetch('/api/admin/thinktank-posts?adminPassword='+encodeURIComponent(adminPassword));
        const result=await response.json();
        if(!result.success){setStatus(statusEl,result.error||'load failed','error');return;}
        cards.innerHTML='';
        (result.posts||[]).forEach(item=>addCard(item));
        if((result.posts||[]).length===0)addCard();
        setStatus(statusEl,'\u5DF2\u8BFB\u53D6 '+(result.posts||[]).length+' \u7BC7\u6587\u7AE0\u3002','ok');
      }catch(error){setStatus(statusEl,error.message,'error');}
    }

    async function savePosts(){
      const adminPassword=requirePassword();if(!adminPassword)return;
      const posts=collectCards();
      if(posts.length===0){setStatus(statusEl,'\u81F3\u5C11\u4FDD\u7559\u4E00\u7BC7\u6587\u7AE0\u3002','error');return;}
      if(posts.some(item=>!item.title)){setStatus(statusEl,'\u6BCF\u7BC7\u6587\u7AE0\u90FD\u9700\u8981\u6807\u9898\u3002','error');return;}
      setStatus(statusEl,'\u6B63\u5728\u4FDD\u5B58\u667A\u5E93\u6587\u7AE0...','');
      try{
        const response=await fetch('/api/admin/thinktank-posts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({adminPassword,posts})});
        const result=await response.json();
        if(!result.success){setStatus(statusEl,result.error||'save failed','error');return;}
        setStatus(statusEl,'\u4FDD\u5B58\u6210\u529F\uFF0C\u5F53\u524D '+(result.count||0)+' \u7BC7\u6587\u7AE0\u3002','ok');
        await loadPosts();
      }catch(error){setStatus(statusEl,error.message,'error');}
    }

    addCard();
    loadPosts();
  </script>
</body>
</html>
