<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DYOR 哨兵营基金看板</title>
  <style>
    :root {
      --bg: #050505;
      --bg-soft: #0b0b0c;
      --panel: rgba(255, 255, 255, 0.04);
      --panel-strong: rgba(255, 255, 255, 0.06);
      --border: rgba(212, 175, 55, 0.18);
      --border-strong: rgba(212, 175, 55, 0.34);
      --gold: #d4af37;
      --gold-light: #f3df9b;
      --gold-deep: #8f6a16;
      --green: #29c98a;
      --red: #ff6b6b;
      --text: #f5f1e8;
      --text-soft: rgba(245, 241, 232, 0.72);
      --text-muted: rgba(245, 241, 232, 0.46);
      --shadow-lg: 0 24px 80px rgba(0, 0, 0, 0.45);
      --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.28);
      --glow-gold: 0 0 0 1px rgba(212, 175, 55, 0.1), 0 8px 30px rgba(212, 175, 55, 0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      color: var(--text);
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.12), transparent 30%),
        radial-gradient(circle at top right, rgba(212, 175, 55, 0.08), transparent 24%),
        radial-gradient(circle at bottom center, rgba(255, 255, 255, 0.03), transparent 35%),
        linear-gradient(135deg, #020202 0%, #090909 46%, #111111 100%);
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 90%);
      opacity: 0.25;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(212,175,55,0.04), transparent 18%, transparent 82%, rgba(212,175,55,0.03));
    }
    .container {
      max-width: 1240px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    header {
      text-align: center;
      padding: 42px 20px 34px;
      margin-bottom: 28px;
      position: relative;
      border: 1px solid rgba(243, 223, 155, 0.15);
      border-radius: 24px;
      background:
        radial-gradient(circle at 50% 0%, rgba(243,223,155,0.12), transparent 46%),
        linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.015) 100%),
        url('/images/hero-bg-main.png') center/cover no-repeat;
      box-shadow: 0 30px 60px rgba(0,0,0,0.35);
      overflow: hidden;
      isolation: isolate;
    }
    header::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(3, 3, 3, 0.7) 0%, rgba(3, 3, 3, 0.46) 40%, rgba(3, 3, 3, 0.78) 100%),
        radial-gradient(circle at center, rgba(243,223,155,0.09), transparent 46%);
      opacity: 1;
      filter: saturate(0.95);
    }
    header::after {
      content: "";
      width: 120px;
      height: 2px;
      margin: 20px auto 0;
      display: block;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .brand-kicker {
      margin-top: 0;
      color: rgba(243,223,155,0.92);
      font-size: 0.8rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }
    header h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.4rem, 5vw, 4.4rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 14px;
      color: transparent;
      background: linear-gradient(180deg, #fff7da 0%, #f3df9b 35%, #d4af37 70%, #8f6a16 100%);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 0 28px rgba(212, 175, 55, 0.12);
      position: relative;
      z-index: 1;
    }
    header p {
      color: var(--text-soft);
      font-size: 1.05rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }
    .header-tagline {
      margin-top: 10px;
      color: rgba(245, 241, 232, 0.7);
      font-size: 0.92rem;
      letter-spacing: 0.06em;
      text-transform: none;
      max-width: 760px;
      margin-left: auto;
      margin-right: auto;
      position: relative;
      z-index: 1;
    }
    .get-data-btn {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 230, 160, 0.4);
      background: linear-gradient(135deg, #f7e6a5 0%, #d4af37 42%, #9f771b 100%);
      color: #111;
      padding: 18px 56px;
      border-radius: 14px;
      font-size: 1.08rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      margin: 28px auto;
      display: block;
      transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
      box-shadow: 0 12px 30px rgba(212, 175, 55, 0.18), inset 0 1px 0 rgba(255,255,255,0.45);
    }
    .get-data-btn:hover {
      transform: translateY(-3px);
      filter: brightness(1.03);
      box-shadow: 0 18px 42px rgba(212, 175, 55, 0.24), inset 0 1px 0 rgba(255,255,255,0.55);
    }
    .get-data-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      filter: grayscale(0.1);
    }
    .hero-links { display:flex; justify-content:center; gap:14px; flex-wrap:wrap; margin: 28px auto 18px; position: relative; z-index: 1; }
    .hero-links .get-data-btn { margin:0; }
    .hero-link-btn { border:1px solid rgba(243, 223, 155, 0.24); background:rgba(255,255,255,0.04); color:var(--gold-light); padding:18px 36px; border-radius:14px; font-size:1.04rem; font-weight:700; letter-spacing:0.08em; cursor:pointer; transition:transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease; box-shadow: var(--shadow-md); text-decoration:none; display:inline-flex; align-items:center; justify-content:center; }
    .hero-link-btn,
    .get-data-btn {
      backdrop-filter: blur(8px);
    }
        .section-link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid rgba(212, 175, 55, 0.2);
      background: rgba(212, 175, 55, 0.08);
      color: var(--gold-light);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 700;
      transition: all 0.25s ease;
    }
    .section-link-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(212, 175, 55, 0.4);
      background: rgba(212, 175, 55, 0.14);
    }
.hero-link-btn:hover { transform:translateY(-3px); border-color:rgba(243,223,155,0.5); box-shadow:0 18px 42px rgba(212, 175, 55, 0.16); }
    .login-section, .nav-section, .assets-table, .breakdown-card, .nav-detail-item, .nav-explanation, .locked-hint {
      background: linear-gradient(180deg, rgba(255,255,255,0.055) 0%, rgba(255,255,255,0.028) 100%);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(18px);
    }
    .login-section, .nav-section, .assets-table { position: relative; }
    .login-section::before, .nav-section::before, .assets-table::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      padding: 1px;
      background: linear-gradient(135deg, rgba(243,223,155,0.28), rgba(255,255,255,0.04), rgba(212,175,55,0.12));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }
    .login-section {
      border-radius: 20px;
      padding: 34px 30px;
      max-width: 420px;
      margin: 20px auto;
      text-align: center;
    }
    .login-section h3 {
      margin-bottom: 18px;
      color: var(--gold-light);
      font-size: 1.25rem;
      letter-spacing: 0.08em;
    }
    .login-section input {
      width: 100%;
      padding: 15px 16px;
      border-radius: 10px;
      border: 1px solid rgba(212, 175, 55, 0.16);
      background: rgba(0, 0, 0, 0.36);
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 14px;
      text-align: center;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }
    .login-section input::placeholder { color: rgba(245, 241, 232, 0.32); }
    .login-section input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.08);
      background: rgba(0, 0, 0, 0.5);
    }
    .login-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #f7e6a5 0%, #d4af37 42%, #9f771b 100%);
      color: #111;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      box-shadow: 0 10px 24px rgba(212, 175, 55, 0.18);
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 32px rgba(212, 175, 55, 0.24);
    }
    .login-error { color: var(--red); margin-top: 10px; font-size: 0.92rem; }
    .login-success { color: var(--green); margin-top: 10px; font-size: 0.92rem; }
    .logout-btn {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(212, 175, 55, 0.15);
      color: var(--text-soft);
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-top: 15px;
      transition: all 0.25s ease;
    }
        .member-link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(212, 175, 55, 0.2);
      background: rgba(212, 175, 55, 0.08);
      color: var(--gold-light);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 700;
      transition: all 0.25s ease;
    }
    .member-link-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(212, 175, 55, 0.4);
      background: rgba(212, 175, 55, 0.14);
    }
.logout-btn:hover {
      border-color: rgba(255, 107, 107, 0.45);
      color: var(--red);
      background: rgba(255, 107, 107, 0.06);
    }
    .access-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.76rem;
      margin-top: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid transparent;
    }
    .access-badge.public { background: rgba(41, 201, 138, 0.1); color: var(--green); border-color: rgba(41, 201, 138, 0.2); }
    .access-badge.private { background: rgba(212, 175, 55, 0.1); color: var(--gold-light); border-color: rgba(212, 175, 55, 0.24); }
    .nav-section {
      border-radius: 22px;
      padding: 34px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-lg), var(--glow-gold);
    }
    .nav-header { text-align: center; margin-bottom: 24px; }
    .nav-header .label {
      color: var(--gold-light);
      font-size: 0.88rem;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.28em;
    }
    .nav-header .value {
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 800;
      line-height: 1;
      color: transparent;
      background: linear-gradient(180deg, #fffaf0 0%, #f3df9b 26%, #d4af37 62%, #8f6a16 100%);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 0 28px rgba(212, 175, 55, 0.18);
    }
    .nav-header .change { font-size: 1.05rem; margin-top: 12px; font-weight: 600; }
    .nav-header .change.positive { color: var(--green); }
    .nav-header .change.negative { color: var(--red); }
    .nav-details {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 22px;
    }
    .nav-detail-item {
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      transition: transform 0.25s ease, border-color 0.25s ease;
    }
    .nav-detail-item:hover {
      transform: translateY(-2px);
      border-color: rgba(212, 175, 55, 0.18);
    }
    .nav-detail-item .label { color: var(--text-muted); font-size: 0.82rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
    .nav-detail-item .value { font-size: 1.65rem; font-weight: 700; color: var(--text); }
    .nav-explanation {
      border-radius: 14px;
      padding: 22px 22px 22px 20px;
      border-left: 3px solid var(--gold);
    }
    .nav-explanation h4 { color: var(--gold-light); margin-bottom: 10px; font-size: 1rem; letter-spacing: 0.05em; }
    .nav-explanation p { color: var(--text-soft); font-size: 0.92rem; line-height: 1.75; margin: 0; }
    .nav-explanation strong { color: var(--gold-light); }
    .nav-chart {
      margin: 22px 0;
      border-radius: 16px;
      padding: 18px 18px 14px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .nav-chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .nav-chart-title {
      color: var(--gold-light);
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .nav-chart-meta {
      color: var(--text-muted);
      font-size: 0.82rem;
    }
    .nav-chart-meta strong {
      color: var(--text-soft);
      font-weight: 700;
    }
    .nav-chart-wrap {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 6px;
    }
    .nav-chart-empty {
      color: var(--text-muted);
      text-align: center;
      padding: 36px 18px;
      font-size: 0.92rem;
    }
    .nav-chart-axis {
      fill: var(--text-muted);
      font-size: 11px;
    }
    .nav-chart-grid {
      stroke: rgba(255,255,255,0.08);
      stroke-width: 1;
      shape-rendering: crispEdges;
    }
    .nav-chart-bar {
      fill: rgba(212,175,55,0.35);
      stroke: rgba(243,223,155,0.45);
      stroke-width: 1;
    }
    .nav-chart-line {
      fill: none;
      stroke: #8ec5ff;
      stroke-width: 2.1;
    }
    .nav-chart-point {
      fill: #8ec5ff;
      stroke: #dff0ff;
      stroke-width: 1;
    }
    .nav-chart-footer {
      margin-top: 10px;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .breakdown-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 22px 0;
    }
    .breakdown-card {
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }
    .breakdown-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
    }
    .breakdown-card.binance { border-color: rgba(212, 175, 55, 0.22); box-shadow: inset 0 1px 0 rgba(243,223,155,0.06); }
    .breakdown-card.alpha { border-color: rgba(41, 201, 138, 0.16); }
    .breakdown-card .source-icon { font-size: 1.65rem; margin-bottom: 10px; }
    .breakdown-card .source-name { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
    .breakdown-card .source-value { font-size: 2rem; font-weight: 800; color: var(--text); }
    .breakdown-card.binance .source-value { color: var(--gold-light); }
    .breakdown-card.alpha .source-value { color: var(--green); }
    .breakdown-card .asset-count { color: var(--text-muted); font-size: 0.82rem; margin-top: 8px; }
    .holdings-section { margin-top: 34px; }
    .wallet-board {
      margin-top: 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.06);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      padding: 18px;
    }
    .wallet-board-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .wallet-board-title {
      color: var(--gold-light);
      font-weight: 700;
      letter-spacing: 0.06em;
    }
    .wallet-board-toolbar {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .wallet-board-meta {
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .wallet-refresh-btn {
      padding: 7px 12px;
      border-radius: 8px;
      border: 1px solid rgba(243,223,155,0.28);
      background: rgba(243,223,155,0.1);
      color: var(--gold-light);
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
    }
    .wallet-refresh-btn:hover { border-color: rgba(243,223,155,0.45); }
    .wallet-mini-addresses {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .wallet-address-pill {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 10px;
    }
    .wallet-address-pill-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .wallet-copy-btn {
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid rgba(243,223,155,0.24);
      background: rgba(243,223,155,0.1);
      color: var(--gold-light);
      font-size: 0.74rem;
      cursor: pointer;
    }
    .wallet-status {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .wallet-status.connected {
      color: var(--green);
      background: rgba(41,201,138,0.12);
      border-color: rgba(41,201,138,0.3);
    }
    .wallet-status.disconnected {
      color: var(--red);
      background: rgba(255,107,107,0.12);
      border-color: rgba(255,107,107,0.3);
    }
    .wallet-main-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 12px;
    }
    .wallet-card {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.22);
      border-radius: 12px;
      padding: 12px;
      min-height: 150px;
    }
    .wallet-card h4 {
      margin: 0 0 10px;
      color: var(--gold-light);
      font-size: 0.92rem;
      letter-spacing: 0.06em;
    }
    .wallet-list {
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
      padding-right: 4px;
    }
    .wallet-list-item {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.02);
      font-size: 0.86rem;
      color: var(--text-soft);
    }
    .wallet-item-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }
    .wallet-address {
      color: var(--text-muted);
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.78rem;
      margin-top: 4px;
      word-break: break-all;
    }
    .wallet-value {
      color: var(--gold-light);
      font-weight: 700;
      font-size: 0.86rem;
    }
    .wallet-token-meta {
      display: grid;
      gap: 4px;
      margin-top: 6px;
      color: var(--text-muted);
      font-size: 0.78rem;
      line-height: 1.35;
    }
    .wallet-token-row { display: flex; justify-content: space-between; gap: 8px; }
    .wallet-positive { color: var(--green); font-weight: 700; }
    .wallet-negative { color: var(--red); font-weight: 700; }
    .wallet-tx-tag {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
    }
    .wallet-tx-tag.in {
      color: var(--green);
      background: rgba(41,201,138,0.1);
      border-color: rgba(41,201,138,0.22);
    }
    .wallet-tx-tag.out {
      color: var(--red);
      background: rgba(255,107,107,0.1);
      border-color: rgba(255,107,107,0.22);
    }
    .wallet-empty {
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 12px 0;
      text-align: center;
    }
    .wallet-warn {
      margin-top: 10px;
      color: #ffd38a;
      font-size: 0.8rem;
    }
    .wallet-change-ticker {
      margin: 12px 0;

    .wallet-change-track {

    .wallet-change-track span { display: inline-flex; gap: 6px; align-items: center; }
    .wallet-change-track .increase { color: var(--green); }

    .wallet-holdings-table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 12px;
      font-size: 0.84rem;
    }
    .wallet-holdings-table th,
    .wallet-holdings-table td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      text-align: left;
      vertical-align: middle;
    }
    .wallet-holdings-table th {
      color: var(--gold-light);
      background: rgba(255,255,255,0.035);
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .wallet-holdings-table td { color: var(--text-soft); }
    .wallet-holdings-table .mono {
      font-family: Consolas, "Courier New", monospace;
      word-break: break-all;
    }
    .wallet-contract-cell {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .wallet-holdings-wide {
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.2);
    }
    .wallet-holdings-wide .wallet-holdings-table {
      min-width: 760px;
    }
    @keyframes walletTicker {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }
    .holdings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .holdings-header h2 { color: var(--gold-light); font-size: 1.45rem; letter-spacing: 0.06em; }
    .position-broadcast {
      margin-bottom: 16px;
      border-radius: 14px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .position-broadcast-title {
      color: var(--gold-light);
      font-size: 0.9rem;
      margin-bottom: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .position-broadcast-meta {
      color: var(--text-muted);
      font-size: 0.78rem;
      margin-bottom: 10px;
    }
    .position-broadcast-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .position-change-tag {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.82rem;
      border: 1px solid transparent;
      background: rgba(255,255,255,0.02);
    }
    .position-change-main {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-weight: 700;
    }
    .position-change-ratio {
      font-size: 0.74rem;
      color: var(--text-muted);
      line-height: 1.2;
    }
    .position-change-tag.increase {
      color: var(--green);
      border-color: rgba(41, 201, 138, 0.35);
      background: rgba(41, 201, 138, 0.08);
    }
    .position-change-tag.decrease {
      color: var(--red);
      border-color: rgba(255, 107, 107, 0.35);

    .position-broadcast-empty {

    .position-history {
      margin-top: 12px;

    .position-history-title {

    .position-history-item {
      border: 1px solid rgba(255,255,255,0.08);

    .position-history-item .position-broadcast-meta {

    .supply-structure-layout {

      grid-template-columns: 220px 1fr;

    .supply-pie-wrap {

      align-items: center;

    .assets-table { border-radius: 20px; overflow: hidden; }
    .table-header {
      display: grid;
      grid-template-columns: 1fr 1.1fr 1fr 1fr 1.2fr 1.2fr .9fr;
      padding: 20px 22px;

    .asset-row {
      display: grid;
      grid-template-columns: 1fr 1.1fr 1fr 1fr 1.2fr 1.2fr .9fr;

      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      align-items: center;
      transition: background 0.25s ease, transform 0.25s ease;
    }
    .asset-row:hover { background: rgba(212, 175, 55, 0.04); }
    .asset-row:last-child { border-bottom: none; }
    .symbol-cell { display: flex; flex-direction: column; gap: 7px; }
    .symbol { font-weight: 700; font-size: 1.08rem; color: var(--text); }
    .source-tag {
      font-size: 0.68rem;
      padding: 4px 10px;
      border-radius: 999px;
      display: inline-block;
      width: fit-content;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid transparent;
    }
    .source-tag.binance { background: rgba(212, 175, 55, 0.12); color: var(--gold-light); border-color: rgba(212, 175, 55, 0.2); }
    .source-tag.alpha { background: rgba(41, 201, 138, 0.12); color: var(--green); border-color: rgba(41, 201, 138, 0.18); }
    .amount, .price, .value, .ratio { font-family: "Consolas", "Courier New", monospace; letter-spacing: 0.02em; }
    .amount, .price, .ratio { color: var(--text-soft); }
    .value { font-weight: 700; color: var(--gold-light); }
    .ratio { font-weight: 700; }
    .cost-cell { display: flex; align-items: center; gap: 6px; }
    .cost-input {
      width: 94px;
      padding: 8px 9px;
      border-radius: 8px;
      border: 1px solid rgba(212,175,55,.24);

    .cost-input:focus {

      border-color: rgba(212,175,55,.62);
      box-shadow: 0 0 0 2px rgba(212,175,55,.12);

      border: 1px solid rgba(212,175,55,.22);

      color: var(--gold-light);
      border-radius: 8px;
      padding: 7px 8px;
      cursor: pointer;
      font-size: 0.76rem;
      white-space: nowrap;
    }
    .cost-btn:hover { background: rgba(212,175,55,.16); }
    .cost-admin-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .cost-admin-inline input {
      padding: 9px 11px;
      border-radius: 8px;
      border: 1px solid rgba(212,175,55,.24);
      background: rgba(0,0,0,.34);
      color: var(--text);
      min-width: 190px;
    }
    .cost-admin-status { color: var(--text-muted); font-size: .86rem; }
    .loading, .error, .initial-state, .locked-hint, .refresh-hint { text-align: center; }
    .loading { padding: 64px; color: var(--text-muted); font-size: 1.08rem; }
    .loading::after {
      content: '';
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(212, 175, 55, 0.36);
      border-top-color: var(--gold);
      border-radius: 50%;
      margin-left: 10px;
      animation: spin 1s linear infinite;
    }
    .error { padding: 64px; color: var(--red); }
    .initial-state { padding: 90px 20px; color: var(--text-muted); }
    .initial-state .icon { font-size: 4rem; margin-bottom: 20px; opacity: 0.45; filter: grayscale(0.1); }
    .refresh-hint { color: var(--text-muted); font-size: 0.82rem; margin-top: 18px; }
    .locked-hint { padding: 40px; color: var(--text-soft); border-radius: 16px; margin-top: 22px; }
    .locked-hint .icon { font-size: 3rem; margin-bottom: 14px; color: var(--gold); }
    .time-display { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 768px) {
      body { padding: 16px; }
      header { padding: 30px 12px 24px; }
      header::before {
        background:
          linear-gradient(180deg, rgba(3, 3, 3, 0.78) 0%, rgba(3, 3, 3, 0.55) 40%, rgba(3, 3, 3, 0.84) 100%),
          radial-gradient(circle at center, rgba(243,223,155,0.08), transparent 52%);
      }
      .breakdown-cards, .nav-details { grid-template-columns: 1fr; }
      .wallet-mini-addresses { grid-template-columns: 1fr; }
      .wallet-main-grid { grid-template-columns: 1fr; }
      .supply-structure-layout { grid-template-columns: 1fr; gap: 12px; }
      .supply-structure-metrics { grid-template-columns: 1fr; }
      .table-header, .asset-row { grid-template-columns: 1fr 1fr 1fr 1fr; font-size: 0.84rem; padding: 18px 16px; }
      .table-header div:nth-child(2), .asset-row div:nth-child(2),
      .table-header div:nth-child(6), .asset-row div:nth-child(6),
      .table-header div:nth-child(7), .asset-row div:nth-child(7) { display: none; }
      .cost-cell { flex-direction: column; align-items: flex-start; }
      .cost-input { width: 100%; max-width: 130px; }
      .nav-section, .login-section { padding: 24px 18px; }
      .nav-header .value { font-size: 2.6rem; }
      .hero-links { flex-direction: column; }
      .get-data-btn, .hero-link-btn { width: 100%; padding: 16px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand-kicker">SENTINEL CAMP</div>
      <h1>DYOR &#x793E;&#x533A;&#x57FA;&#x91D1;</h1>
      <p>AI&#x9A71;&#x52A8;&#xFF0C;&#x900F;&#x660E;&#x516C;&#x6B63;</p>
      <p class="header-tagline">以纪律为底，以系统为刃。仓位管理、投研追踪、资产可视化一体化运行。</p>
      <div class="hero-links">
        <button class="get-data-btn" onclick="loadFundData()" id="getDataBtn">&#x83B7;&#x53D6;&#x57FA;&#x91D1;&#x60C5;&#x51B5;</button>
        <a class="hero-link-btn" href="/investor.html">&#x6211;&#x662F;&#x6295;&#x8D44;&#x4EBA;</a>
        <a class="hero-link-btn" href="/sentinel-plan.html">&#x4E86;&#x89E3;&#x8D44;&#x4EA7;&#x59D4;&#x6258;&#x8BA1;&#x5212;</a>
        <a class="hero-link-btn" href="/contact.html">&#x8054;&#x7CFB;&#x6211;&#x4EEC;</a>
        <a class="hero-link-btn" href="/downloads.html">客户端下载中心</a>
        <a class="hero-link-btn" href="/linkage.html">概念联动雷达</a>
      </div>
    </header>

    <div id="content">
      <div class="initial-state">
        <div class="icon">◈</div>
        <p>点击上方按钮获取最新基金数据</p>
      </div>
    </div>
    <p class="refresh-hint">点击按钮获取最新现价和持仓数据</p>
  </div>
  <script>
    let isLoggedIn = localStorage.getItem('fundViewLoggedIn') === 'true';
    let userEmail = localStorage.getItem('fundViewEmail') || '';
    let latestVisibleAssets = [];
    async function loadFundData() {
      const btn = document.getElementById('getDataBtn');
      const content = document.getElementById('content');
      btn.disabled = true;
      btn.textContent = '加载中...';
      content.innerHTML = '<div class="loading">正在获取基金数据</div>';
      try {
        const fundResponse = await fetch('/api/fund');
        const fundData = await fundResponse.json();
        if (fundData.success) {
          let html = renderFundOverview(fundData);
          if (isLoggedIn && userEmail) {
            try {
              const assetsResponse = await fetch(`/api/assets?email=${encodeURIComponent(userEmail)}`);
              const assetsData = await assetsResponse.json();
              if (assetsData.success) {
                html += renderHoldings(assetsData);
              } else {
                isLoggedIn = false;
                localStorage.removeItem('fundViewLoggedIn');
                localStorage.removeItem('fundViewEmail');
                html += renderLoginSection();
              }
            } catch (error) {
              html += renderLoginSection();
            }
          } else {
            html += renderLoginSection();
          }
          content.innerHTML = html;
        } else {
          showError(fundData.error || '获取数据失败');
        }
      } catch (error) {
        showError('网络错误: ' + error.message);
      }
      btn.disabled = false;
      btn.textContent = '获取基金情况';
    }
    function renderFundOverview(data) {
      const { totalValue, fund, timestamp, navHistory } = data;
      const navChangeClass = fund.navChange >= 0 ? 'positive' : 'negative';
      const navChangeSymbol = fund.navChange >= 0 ? '+' : '';
      return `
        <div class="nav-section">
          <div class="nav-header">
            <div class="label">&#x5F53;&#x524D;&#x51C0;&#x503C;</div>
            <div class="value">${fund.currentNav}</div>
            <div class="change ${navChangeClass}">${navChangeSymbol}${fund.navChange}% (&#x81EA;&#x521D;&#x59CB;&#x51C0;&#x503C; ${fund.initialNav})</div>
          </div>
          <div class="nav-details">
            <div class="nav-detail-item">
              <div class="label">&#x603B;&#x4EFD;&#x989D;</div>
              <div class="value">${fund.totalShares.toLocaleString()}</div>
            </div>
            <div class="nav-detail-item">
              <div class="label">&#x57FA;&#x91D1;&#x603B;&#x8D44;&#x4EA7;</div>
              <div class="value">$${formatNumber(totalValue)}</div>
            </div>
          </div>
          <div class="nav-explanation">
            <h4>&#x51C0;&#x503C;&#x8BF4;&#x660E;</h4>
            <p>&#x8D44;&#x4EA7;&#x51C0;&#x503C;&#x53EF;&#x4EE5;&#x7406;&#x89E3;&#x4E3A;&#x57FA;&#x91D1;&#x7684;&#x201C;&#x5355;&#x4F4D;&#x4EF7;&#x683C;&#x201D;&#x3002;&#x521D;&#x59CB;&#x51C0;&#x503C;&#x4E3A; 1&#xFF0C;&#x4EE3;&#x8868;&#x6BCF;&#x4EFD;&#x5BF9;&#x5E94; 1 USDT&#x3002;&#x51C0;&#x503C;&#x4E0A;&#x6DA8;&#x8BF4;&#x660E;&#x6574;&#x4F53;&#x76C8;&#x5229;&#xFF0C;&#x51C0;&#x503C;&#x4E0B;&#x964D;&#x8BF4;&#x660E;&#x6574;&#x4F53;&#x4E8F;&#x635F;&#x3002;&#x6240;&#x6709;&#x8D44;&#x91D1;&#x8FDB;&#x51FA;&#x5747;&#x6309;&#x51C0;&#x503C;&#x6362;&#x7B97;&#x4EFD;&#x989D;&#xFF0C;&#x6536;&#x76CA;&#x968F;&#x51C0;&#x503C;&#x53D8;&#x5316;&#x3002;<br><br><strong>&#x63D0;&#x793A;&#xFF1A;</strong>&#x65B0;&#x52A0;&#x5165;&#x8D44;&#x91D1;&#x6309;&#x7167;&#x5F53;&#x524D;&#x8D44;&#x4EA7;&#x51C0;&#x503C;&#x8FDB;&#x884C;&#x4EFD;&#x989D;&#x6362;&#x7B97;&#xFF0C;&#x76C8;&#x4E8F;&#x4EE5;&#x52A0;&#x5165;&#x65F6;&#x8D44;&#x4EA7;&#x51C0;&#x503C;&#x540E;&#x7EED;&#x6DA8;&#x8DCC;&#x4E3A;&#x51C6;&#x3002;</p>
          </div>
          ${renderNavChart(navHistory || [], fund.currentNav)}
          <div class="time-display">&#x66F4;&#x65B0;&#x65F6;&#x95F4;: ${new Date(timestamp).toLocaleString('zh-CN')}</div>
        </div>
      `;
    }
    function renderNavChart(candles, currentNav) {
      if (!candles || candles.length === 0) {
        return `
          <div class="nav-chart">
            <div class="nav-chart-header">
              <div class="nav-chart-title">&#x8D44;&#x4EA7;&#x51C0;&#x503C;&#x65E5;&#x56FE;</div>
            </div>
            <div class="nav-chart-empty">&#x6682;&#x65E0;&#x5386;&#x53F2;&#x51C0;&#x503C;&#x6570;&#x636E;&#xFF0C;&#x56FE;&#x8868;&#x4F1A;&#x968F;&#x6BCF;&#x65E5;&#x8BB0;&#x5F55;&#x9010;&#x6B65;&#x5F62;&#x6210;&#x3002;</div>
          </div>
        `;
      }

      const visibleCandles = candles.slice(-60);
      const values = visibleCandles.map(candle => Number(candle.close));
      const minPrice = Math.min(...values);
      const maxPrice = Math.max(...values);
      const spread = Math.max(maxPrice - minPrice, 0.0001);
      const padding = spread * 0.12;
      const chartMin = minPrice - padding;
      const chartMax = maxPrice + padding;
      const innerHeight = 220;
      const width = Math.max(visibleCandles.length * 16 + 90, 720);
      const height = 280;
      const left = 52;
      const top = 16;
      const chartWidth = width - left - 22;
      const itemGap = chartWidth / visibleCandles.length;
      const barWidth = Math.max(4, Math.min(10, itemGap * 0.82));

      const yOf = value => {
        const ratio = (Number(value) - chartMin) / (chartMax - chartMin);
        return top + innerHeight - (ratio * innerHeight);
      };

      const axisLabels = [chartMax, chartMin + (chartMax - chartMin) * 0.66, chartMin + (chartMax - chartMin) * 0.33, chartMin];
      const gridLines = axisLabels.map(value => {
        const y = yOf(value);
        return `<line class="nav-chart-grid" x1="${left}" y1="${y}" x2="${width - 10}" y2="${y}"></line>`;
      }).join('');

      const barBaseY = yOf(chartMin);
      const barsSvg = visibleCandles.map((candle, index) => {
        const value = Number(candle.close);
        const x = left + itemGap * index + itemGap / 2;
        const y = yOf(value);
        const barHeight = Math.max(1.2, barBaseY - y);
        const dateLabel = (candle.date || '').slice(5);
        return `
          <g>
            <title>${candle.date} | NAV ${value.toFixed(4)}</title>
            <rect class="nav-chart-bar" x="${x - barWidth / 2}" y="${y}" width="${barWidth}" height="${barHeight}" rx="1.2"></rect>
            ${index % Math.ceil(Math.max(1, visibleCandles.length / 6)) === 0 ? `<text class="nav-chart-axis" x="${x}" y="${height - 12}" text-anchor="middle">${dateLabel}</text>` : ''}
          </g>
        `;
      }).join('');

      const linePoints = visibleCandles.map((candle, index) => {
        const x = left + itemGap * index + itemGap / 2;
        const y = yOf(Number(candle.close));
        return `${x},${y}`;
      }).join(' ');

      const pointsSvg = visibleCandles.map((candle, index) => {
        if (index % Math.ceil(Math.max(1, visibleCandles.length / 12)) !== 0 && index !== visibleCandles.length - 1) return '';
        const x = left + itemGap * index + itemGap / 2;
        const y = yOf(Number(candle.close));
        return `<circle class="nav-chart-point" cx="${x}" cy="${y}" r="2.2"></circle>`;
      }).join('');

      const axisText = axisLabels.map(value => {
        const y = yOf(value) + 4;
        return `<text class="nav-chart-axis" x="8" y="${y}">${Number(value).toFixed(4)}</text>`;
      }).join('');

      return `
        <div class="nav-chart">
          <div class="nav-chart-header">
            <div class="nav-chart-title">&#x8D44;&#x4EA7;&#x51C0;&#x503C;&#x65E5;&#x56FE;</div>
            <div class="nav-chart-meta">
              <strong>${visibleCandles.length}</strong> &#x5929;
              &nbsp;|&nbsp;
              &#x6700;&#x65B0; <strong>${Number(currentNav).toFixed(4)}</strong>
            </div>
          </div>
          <div class="nav-chart-wrap">
            <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" role="img" aria-label="NAV daily bar and line chart">
              ${gridLines}
              ${axisText}
              ${barsSvg}
              <polyline class="nav-chart-line" points="${linePoints}"></polyline>
              ${pointsSvg}
            </svg>
          </div>
          <div class="nav-chart-footer">&#x6BCF;&#x65E5;&#x67F1;&#x72B6;&#x8868;&#x793A;&#x5F53;&#x65E5;&#x51C0;&#x503C;&#x9AD8;&#x5EA6;&#xFF0C;&#x8FDE;&#x7EBF;&#x8868;&#x793A;&#x51C0;&#x503C;&#x8D8B;&#x52BF;&#x3002;</div>
        </div>
      `;
    }
    function renderLoginSection() {
      const accessLevel = isLoggedIn ?
        '<span class="access-badge private">已解锁完整持仓</span>' :
        '<span class="access-badge public">仅公开数据</span>';
      if (isLoggedIn) {
        return `
          <div class="login-section">
            ${accessLevel}
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 10px;">&#x5DF2;&#x9A8C;&#x8BC1;&#x90AE;&#x7BB1;: ${userEmail}</p>
            <a class="member-link-btn" href="/member-research.html">&#x67E5;&#x770B;&#x6838;&#x5FC3;&#x6210;&#x5458;&#x9879;&#x76EE;&#x6295;&#x7814;</a>
            <button class="logout-btn" onclick="logout()">&#x9000;&#x51FA;</button>
          </div>
        `;
      }
      return `
        <div class="login-section">
          <h3>查看持仓明细</h3>
          <p style="color: var(--text-soft); margin-bottom: 15px; font-size: 0.9rem;">输入白名单邮箱查看具体代币持仓</p>
          <p style="color: var(--text-muted); margin-bottom: 15px; font-size: 0.8rem;">仅限白名单邮箱访问</p>
          <input type="email" id="emailInput" placeholder="请输入白名单邮箱" onkeypress="if(event.key==='Enter')login()">
          <button class="login-btn" onclick="login()">解锁持仓明细</button>
          <div id="loginMessage"></div>
          ${accessLevel}

    function renderHoldings(data) {
      const { assets, totalValue, positionChanges, positionChangeBaseline, positionChangeHistory, positionChangeWindowDays } = data;
      latestVisibleAssets = Array.isArray(assets) ? assets : [];
      const fallbackChanges = (positionChanges || [])
        .filter(change => change.symbol !== 'USDT')
        .slice(0, 8);

      const historyRecords = Array.isArray(positionChangeHistory)
        ? positionChangeHistory
            .map(item => ({
              ...item,
              changes: (item.changes || []).filter(change => change.symbol !== 'USDT').slice(0, 8)
            }))
            .filter(item => item.changes.length > 0)
        : [];

      const latestRecord = historyRecords[0] || {
        timestamp: new Date().toISOString(),
        baselineTimestamp: positionChangeBaseline || null,
        changes: fallbackChanges
      };

      const latestBaselineText = latestRecord.baselineTimestamp
        ? new Date(latestRecord.baselineTimestamp).toLocaleString('zh-CN')
        : null;

      const renderRatioChange = (change) => {
        const hasRatio = Number.isFinite(Number(change.previousRatio)) && Number.isFinite(Number(change.currentRatio));
        if (!hasRatio) return '';
        const prevRatio = Number(change.previousRatio);
        const currRatio = Number(change.currentRatio);
        return `${formatNumber(prevRatio)}% → ${formatNumber(currRatio)}%`;
      };

      const historyHtml = historyRecords.length > 0
        ? `
          <div class="position-history">
            <div class="position-history-title">&#x6700;&#x8FD1; ${Number(positionChangeWindowDays || 7)} &#x5929;&#x53D8;&#x52A8;&#x8BB0;&#x5F55;</div>
            ${historyRecords.map((record, idx) => {
              const recordTime = record.timestamp ? new Date(record.timestamp).toLocaleString('zh-CN') : '-';
              const recordBase = record.baselineTimestamp ? new Date(record.baselineTimestamp).toLocaleString('zh-CN') : null;
              return `
                <div class="position-history-item">
                  <div class="position-broadcast-meta">${idx === 0 ? '&#x6700;&#x65B0;&#x4E00;&#x7B14;' : '&#x5386;&#x53F2;&#x8BB0;&#x5F55;'} | ${recordTime}${recordBase ? ` | &#x5BF9;&#x6BD4;&#x57FA;&#x51C6;: ${recordBase}` : ''}</div>
                  <div class="position-broadcast-list">
                    ${record.changes.map(change => `
                      <span class="position-change-tag ${change.direction}">
                        <span class="position-change-main">
                          <strong>${change.symbol}</strong>
                          <span>${change.direction === 'increase' ? '+' : ''}${formatNumber(change.deltaAmount)}</span>
                        </span>
                        <span class="position-change-ratio">${renderRatioChange(change)}</span>
                      </span>
                    `).join('')}
                  </div>
                </div>
              `;
            }).join('')}
          </div>

        : '';

      const broadcastHtml = latestRecord.changes.length > 0
        ? `

            <div class="position-broadcast-title">&#x4ED3;&#x4F4D;&#x53D8;&#x52A8;&#x64AD;&#x62A5;</div>
            <div class="position-broadcast-meta">${latestBaselineText ? `&#x5BF9;&#x6BD4;&#x57FA;&#x51C6;: ${latestBaselineText}` : '&#x6BD4;&#x5BF9;&#x57FA;&#x51C6;: &#x9996;&#x6B21;&#x5FEB;&#x7167;'}</div>
            <div class="position-broadcast-list">
              ${latestRecord.changes.map(change => `
                <span class="position-change-tag ${change.direction}">
                  <span class="position-change-main">
                    <strong>${change.symbol}</strong>
                    <span>${change.direction === 'increase' ? '+' : ''}${formatNumber(change.deltaAmount)}</span>
                  </span>
                  <span class="position-change-ratio">${renderRatioChange(change)}</span>
                </span>
              `).join('')}
            </div>
            ${historyHtml}

        : `

            <div class="position-broadcast-title">&#x4ED3;&#x4F4D;&#x53D8;&#x52A8;&#x64AD;&#x62A5;</div>
            <div class="position-broadcast-empty">&#x6700;&#x8FD1; ${Number(positionChangeWindowDays || 7)} &#x5929;&#x6682;&#x65E0;&#x65B0;&#x7684;&#x4ED3;&#x4F4D;&#x53D8;&#x52A8;&#x3002;</div>

      return `

            <a class="section-link-btn" href="/member-research.html">&#x67E5;&#x770B;&#x6838;&#x5FC3;&#x6210;&#x5458;&#x9879;&#x76EE;&#x6295;&#x7814;</a>
          </div>
          <div class="cost-admin-inline">
            <input id="costAdminPassword" type="password" placeholder="&#x540E;&#x53F0;&#x5BC6;&#x7801;&#xFF08;DYOR001&#xFF09;">
            <span id="costAdminStatus" class="cost-admin-status">&#x5728;&#x8868;&#x683C;&#x4E2D;&#x76F4;&#x63A5;&#x4FEE;&#x6539;&#x6210;&#x672C;&#x4EF7;&#x540E;&#x70B9;&#x4FDD;&#x5B58;&#x3002;</span>
          </div>
          ${broadcastHtml}
          <div class="assets-table">
            <div class="table-header">
              <div>&#x6807;&#x7684;</div>
              <div>&#x6301;&#x4ED3;&#x6570;&#x91CF;</div>
              <div>&#x5F53;&#x524D;&#x4EF7;&#x683C;</div>
              <div>&#x6210;&#x672C;&#x4EF7;</div>
              <div>&#x4EF7;&#x503C; (USDT)</div>
              <div>&#x6D6E;&#x52A8;&#x76C8;&#x4E8F;</div>
              <div>&#x5360;&#x57FA;&#x91D1;&#x603B;&#x8D44;&#x4EA7;</div>
            </div>
            <div id="assetsList">
              ${assets.map(asset => {
                const ratio = totalValue > 0 ? (asset.usdtValue / totalValue) * 100 : 0;
                const pnlClass = Number(asset.pnlValue || 0) > 0 ? 'green' : (Number(asset.pnlValue || 0) < 0 ? 'red' : '');
                return `
                <div class="asset-row">
                  <div class="symbol-cell">
                    <span class="symbol">${asset.symbol}</span>

                    <button class="cost-btn" data-cost-action="save" data-cost-key="${buildFundAssetKey(asset)}" type="button">&#x4FDD;&#x5B58;</button>
                    <button class="cost-btn" data-cost-action="clear" data-cost-key="${buildFundAssetKey(asset)}" type="button">&#x6E05;&#x9664;</button>

                  <div class="value">$${formatNumber(asset.usdtValue)}</div>
                  <div class="value ${pnlClass}">${asset.pnlValue == null ? '-' : `${asset.pnlValue >= 0 ? '+' : ''}$${formatNumber(asset.pnlValue)} (${asset.pnlPct >= 0 ? '+' : ''}${formatNumber(asset.pnlPct)}%)`}</div>
                  <div class="ratio">${formatNumber(ratio)}%</div>

    function buildFundAssetKey(asset) {
      const chainId = String(asset?.chainId || '').trim();
      const contractAddress = String(asset?.contractAddress || '').trim().toLowerCase();
      const symbol = String(asset?.symbol || '').trim().toUpperCase();
      const source = String(asset?.source || '').trim().toLowerCase();
      if (chainId && contractAddress) return `${chainId}:${contractAddress}`;
      if (source && symbol) return `${source}:symbol:${symbol}`;
      return symbol;
    }

    async function saveFundAssetCostByKey(assetKey, costBasisPrice) {
      const statusEl = document.getElementById('costAdminStatus');
      const adminPassword = String(document.getElementById('costAdminPassword')?.value || '').trim();
      if (!adminPassword) {
        if (statusEl) statusEl.textContent = '请先输入后台密码';
        return;
      }
      const key = String(assetKey || '').trim();
      if (!key) {
        if (statusEl) statusEl.textContent = '代币标识无效，无法保存成本';
        return;
      }
      if (statusEl) statusEl.textContent = '正在保存...';
      const resp = await fetch('/api/admin/fund-asset-costs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          adminPassword,
          items: [{ key, costBasisPrice }]
        })
      });
      const result = await resp.json();
      if (!result.success) {
        if (statusEl) statusEl.textContent = result.error || '保存失败';
        return;
      }
      if (statusEl) statusEl.textContent = costBasisPrice > 0 ? '成本价已保存' : '成本价已清除';
      await loadFundData();
    }

    function bindCostAdminActions() {
      document.querySelectorAll('[data-cost-action]').forEach(button => {
        button.onclick = async () => {
          const key = button.getAttribute('data-cost-key') || '';
          const input = document.querySelector(`.cost-input[data-cost-key="${CSS.escape(key)}"]`);
          const action = button.getAttribute('data-cost-action');
          if (action === 'clear') {
            await saveFundAssetCostByKey(key, 0);
            return;
          }
          const costValue = Number(input?.value || 0);
          if (!Number.isFinite(costValue) || costValue <= 0) {
            const statusEl = document.getElementById('costAdminStatus');
            if (statusEl) statusEl.textContent = '请输入有效成本价';
            return;
          }
          await saveFundAssetCostByKey(key, costValue);
        };
      });
    }

        message.innerHTML = '<div class="login-error">请输入有效邮箱</div>';
        return;
      }
      try {

          body: JSON.stringify({ email })

    async function loadFundData() {
      const btn = document.getElementById('getDataBtn');
      const content = document.getElementById('content');
      btn.disabled = true;
      btn.textContent = '加载中...';
      content.innerHTML = '<div class="loading">正在获取基金数据</div>';
      try {
        const fundResponse = await fetch('/api/fund');
        const fundData = await fundResponse.json();
        if (fundData.success) {
          let html = renderFundOverview(fundData);
          try {
            const walletResponse = await fetch('/api/wallet-dashboard');
            const walletData = await walletResponse.json();
            if (walletData.success) {
              html += renderWalletDashboard(walletData);
            } else {
              html += `<div class="wallet-board"><div class="wallet-empty">钱包看板暂不可用：${walletData.error || 'unknown error'}</div></div>`;
            }
          } catch (walletError) {
            html += `<div class="wallet-board"><div class="wallet-empty">钱包看板加载失败：${walletError.message}</div></div>`;
          }
          if (isLoggedIn && userEmail) {
            try {
              const assetsResponse = await fetch(`/api/assets?email=${encodeURIComponent(userEmail)}`);
              const assetsData = await assetsResponse.json();
              if (assetsData.success) {
                html += renderHoldings(assetsData);
              } else {
                isLoggedIn = false;
                localStorage.removeItem('fundViewLoggedIn');
                localStorage.removeItem('fundViewEmail');
                html += renderLoginSection();
              }
            } catch (error) {
              html += renderLoginSection();
            }
          } else {
            html += renderLoginSection();
          }
          content.innerHTML = html;
        } else {
          showError(fundData.error || '获取数据失败');

    function formatNumber(num) {
      if (num === null || num === undefined) return '-';
      if (num >= 1000000) {
        return num.toLocaleString('en-US', { maximumFractionDigits: 0 });
      } else if (num >= 1) {
        return num.toLocaleString('en-US', { maximumFractionDigits: 2 });
      } else if (num >= 0.01) {
        return num.toLocaleString('en-US', { maximumFractionDigits: 4 });
      } else {
        return num.toLocaleString('en-US', { maximumFractionDigits: 8 });
      }
    }
    function renderSupplyStructure(fund) {
      const supply = fund?.supply || {};
      const totalIssued = Number(supply.totalIssued || fund.totalShares || 0);
      const circulating = Number(supply.circulating || fund.totalShares || 0);
      const burned = Number(supply.totalBurned || 0);
      const pending = Number(supply.pendingUnlock || 0);
      const stageCap = Number(supply.stageCap || Math.max(totalIssued, circulating));
      const safeTotal = Math.max(stageCap, circulating + burned + pending, 0.000001);

      const pct = (v) => (v / safeTotal) * 100;
      const pctText = (v) => `${pct(v).toFixed(2)}%`;
      const dash = (v) => (2 * Math.PI * 84 * pct(v) / 100).toFixed(2);
      const full = (2 * Math.PI * 84).toFixed(2);
      const a1 = pct(circulating) * 3.6;
      const a2 = (pct(circulating) + pct(burned)) * 3.6;
      const polar = (angleDeg, radius) => {
        const rad = angleDeg * Math.PI / 180;
        return {
          x: (Math.cos(rad) * radius).toFixed(1),
          y: (Math.sin(rad) * radius).toFixed(1)
        };
      };
      const midCir = -90 + (a1 / 2);
      const midBurn = -90 + a1 + (pct(burned) * 1.8);
      const midPending = -90 + a2 + (pct(pending) * 1.8);
      const cirPos = polar(midCir, 102);
      const burnPos = polar(midBurn, 102);
      const pendingPos = polar(midPending, 102);
      const cirLabel = circulating > 0
        ? `<text x="${cirPos.x}" y="${cirPos.y}" text-anchor="middle" fill="#9cf0bf" font-size="11" font-weight="700">${pctText(circulating)}</text>`
        : '';
      const burnLabel = burned > 0
        ? `<text x="${burnPos.x}" y="${burnPos.y}" text-anchor="middle" fill="#ffb7b7" font-size="11" font-weight="700">${pctText(burned)}</text>`
        : '';
      const pendingLabel = pending > 0
        ? `<text x="${pendingPos.x}" y="${pendingPos.y}" text-anchor="middle" fill="#ffe6a7" font-size="11" font-weight="700">${pctText(pending)}</text>`
        : '';

      return `
        <div class="nav-explanation" style="margin-top:14px;">
          <h4>&#x53D1;&#x884C;&#x7ED3;&#x6784;</h4>
          <div class="supply-structure-layout">
            <div class="supply-pie-wrap">
            <svg width="220" height="220" viewBox="0 0 220 220" aria-label="supply pie">
              <g transform="translate(110,110)">
                <circle r="84" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="28"></circle>
                <circle r="84" fill="none" stroke="#2fbf71" stroke-width="28" stroke-dasharray="${dash(circulating)} ${full}" transform="rotate(-90)"></circle>
                <circle r="84" fill="none" stroke="#ff6b6b" stroke-width="28" stroke-dasharray="${dash(burned)} ${full}" transform="rotate(${(a1 - 90).toFixed(2)})"></circle>
                <circle r="84" fill="none" stroke="#f0b90b" stroke-width="28" stroke-dasharray="${dash(pending)} ${full}" transform="rotate(${(a2 - 90).toFixed(2)})"></circle>
                <circle r="62" fill="#121821"></circle>
                ${cirLabel}
                ${burnLabel}
                ${pendingLabel}
                <text x="0" y="-6" text-anchor="middle" fill="#9fb0c4" font-size="12">&#x53D1;&#x884C;&#x4E0A;&#x9650;</text>
                <text x="0" y="16" text-anchor="middle" fill="#edf2f7" font-size="16" font-weight="700">${formatNumber(stageCap)}</text>
              </g>
            </svg>
            </div>
            <div class="supply-structure-metrics">
              <div class="nav-detail-item"><div class="label">&#x5F53;&#x524D;&#x53D1;&#x884C;&#x603B;&#x91CF;</div><div class="value">${formatNumber(totalIssued)} (${pctText(totalIssued)})</div></div>
              <div class="nav-detail-item"><div class="label">&#x6D41;&#x901A;&#x91CF;</div><div class="value">${formatNumber(circulating)} (${pctText(circulating)})</div></div>
              <div class="nav-detail-item"><div class="label">&#x9500;&#x6BC1;&#x91CF;</div><div class="value">${formatNumber(burned)} (${pctText(burned)})</div></div>
              <div class="nav-detail-item"><div class="label">&#x5F85;&#x89E3;&#x9501;&#x91CF;</div><div class="value">${formatNumber(pending)} (${pctText(pending)})</div></div>
              <div class="nav-detail-item" style="grid-column:1 / -1;"><div class="label">&#x9636;&#x6BB5;&#x53D1;&#x884C;&#x4E0A;&#x9650;</div><div class="value">${formatNumber(stageCap)}</div></div>
            </div>
          </div>
        </div>
      `;
    }

      const addresses = Array.isArray(data.addresses) ? data.addresses : [];
      const balances = Array.isArray(data.balances) ? data.balances : [];
      const txs = Array.isArray(data.recentTransactions) ? data.recentTransactions : [];

                    html += renderWalletDashboard(walletData);
                  } else {
                    html += `<div class="wallet-board"><div class="wallet-empty">钱包看板暂不可用：${walletData.error || 'unknown error'}</div></div>`;
                  }
                } catch (walletError) {
                  html += `<div class="wallet-board"><div class="wallet-empty">钱包看板加载失败：${walletError.message}</div></div>`;
                }
                html += renderHoldings(assetsData);
              } else {
                isLoggedIn = false;
                localStorage.removeItem('fundViewLoggedIn');
                localStorage.removeItem('fundViewEmail');
                html += `<div class="wallet-board"><div class="wallet-empty">社区基金链上监控仅对白名单成员开放，请先完成白名单登录。</div></div>`;
                html += renderLoginSection();
              }
            } catch (error) {
              html += `<div class="wallet-board"><div class="wallet-empty">社区基金链上监控仅对白名单成员开放，请先完成白名单登录。</div></div>`;
              html += renderLoginSection();
            }
          } else {
            html += `<div class="wallet-board"><div class="wallet-empty">社区基金链上监控仅对白名单成员开放，请先完成白名单登录。</div></div>`;
            html += renderLoginSection();
          }
          content.innerHTML = html;
          bindWalletBoardActions();
          bindCostAdminActions();
          const chartTitle = content.querySelector('.nav-chart-title');
          if (chartTitle) chartTitle.textContent = '份额现价日图';
          const chartEmpty = content.querySelector('.nav-chart-empty');
          if (chartEmpty) chartEmpty.textContent = '暂无历史现价数据，图表会随每日记录逐步形成。';
          const chartFooter = content.querySelector('.nav-chart-footer');
          if (chartFooter) chartFooter.textContent = '每日柱状表示当日现价高度，连线表示份额现价趋势。';
        } else showError(fundData.error || '获取数据失败');
      } catch (error) {
        showError('网络错误: ' + error.message);
      }
      btn.disabled = false;
      btn.textContent = '获取基金情况';
    }

    applyHomepageCopy();
  </script>
</body>
</html>
